name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Verify CLI runs
        run: |
          node dist/copse.js --help
          node dist/copse.js approval --help
          node dist/copse.js create-prs --help
          node dist/copse.js pr-status --help
          node dist/copse.js rerun-failed --help
          node dist/copse.js update-main --help
          node dist/copse.js completion bash > /dev/null
          node dist/copse.js completion zsh > /dev/null
